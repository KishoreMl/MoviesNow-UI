<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theater Seat Selection - Canvas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        
        .theater-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .theater-title {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        
        .screen {
            text-align: center;
            background: linear-gradient(to bottom, #333, #666);
            color: white;
            padding: 10px;
            margin: 20px auto;
            border-radius: 50px;
            width: 60%;
            font-weight: bold;
        }
        
        .canvas-container {
            text-align: center;
            margin: 20px 0;
        }
        
        #theaterCanvas {
            border: 1px solid #ddd;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-seat {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid #333;
        }
        
        .legend-available { background-color: #e8f5e8; }
        .legend-selected { background-color: #4CAF50; }
        .legend-booked { background-color: #f44336; }
        .legend-premium { background-color: #ffd700; }
        
        .selection-info {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
        }
        
        .selected-seats {
            font-weight: bold;
            color: #4CAF50;
        }
        
        .total-price {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="theater-container">
        <h1 class="theater-title">PVR Cinemas - Screen 1</h1>
        
        <div class="screen">SCREEN THIS WAY</div>
        
        <div class="canvas-container">
            <canvas id="theaterCanvas" width="800" height="500"></canvas>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-seat legend-available"></div>
                <span>Available</span>
            </div>
            <div class="legend-item">
                <div class="legend-seat legend-selected"></div>
                <span>Selected</span>
            </div>
            <div class="legend-item">
                <div class="legend-seat legend-booked"></div>
                <span>Booked</span>
            </div>
            <div class="legend-item">
                <div class="legend-seat legend-premium"></div>
                <span>Premium</span>
            </div>
        </div>
        
        <div class="selection-info">
            <div class="selected-seats" id="selectedSeatsDisplay">No seats selected</div>
            <div class="total-price" id="totalPrice">Total: ₹0</div>
        </div>
    </div>

    <script>
        class TheaterSeatSelection {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.selectedSeats = new Set();
                this.hoveredSeat = null;
                
                // Seat dimensions and spacing
                this.seatWidth = 25;
                this.seatHeight = 25;
                this.seatSpacing = 5;
                this.rowSpacing = 15;
                this.sectionSpacing = 40;
                
                // Seat states
                this.SEAT_STATES = {
                    AVAILABLE: 'available',
                    SELECTED: 'selected',
                    BOOKED: 'booked',
                    PREMIUM: 'premium'
                };
                
                // Initialize theater layout
                this.initializeSeats();
                this.bindEvents();
                this.draw();
            }
            
            initializeSeats() {
                this.seats = [];
                
                // Define theater sections
                const sections = [
                    { name: 'Premium', rows: ['A', 'B'], seatsPerRow: 16, startX: 150, startY: 50, price: 350, type: 'premium' },
                    { name: 'Gold', rows: ['C', 'D', 'E', 'F'], seatsPerRow: 20, startX: 100, startY: 120, price: 250, type: 'available' },
                    { name: 'Silver', rows: ['G', 'H', 'I', 'J', 'K'], seatsPerRow: 22, startX: 75, startY: 220, price: 180, type: 'available' }
                ];
                
                sections.forEach(section => {
                    section.rows.forEach((rowName, rowIndex) => {
                        for (let seatNum = 1; seatNum <= section.seatsPerRow; seatNum++) {
                            // Add some randomly booked seats
                            let state = section.type;
                            if (Math.random() < 0.15) { // 15% chance of being booked
                                state = this.SEAT_STATES.BOOKED;
                            }
                            
                            const seat = {
                                id: `${rowName}${seatNum}`,
                                row: rowName,
                                number: seatNum,
                                x: section.startX + (seatNum - 1) * (this.seatWidth + this.seatSpacing),
                                y: section.startY + rowIndex * (this.seatHeight + this.rowSpacing),
                                width: this.seatWidth,
                                height: this.seatHeight,
                                state: state,
                                price: section.price,
                                section: section.name
                            };
                            
                            this.seats.push(seat);
                        }
                    });
                });
            }
            
            bindEvents() {
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
                this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                this.canvas.addEventListener('mouseleave', () => this.handleMouseLeave());
            }
            
            getMousePosition(e) {
                const rect = this.canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }
            
            getSeatAtPosition(x, y) {
                return this.seats.find(seat => 
                    x >= seat.x && 
                    x <= seat.x + seat.width && 
                    y >= seat.y && 
                    y <= seat.y + seat.height
                );
            }
            
            handleClick(e) {
                const pos = this.getMousePosition(e);
                const seat = this.getSeatAtPosition(pos.x, pos.y);
                
                if (seat && (seat.state === this.SEAT_STATES.AVAILABLE || seat.state === this.SEAT_STATES.PREMIUM)) {
                    this.toggleSeat(seat);
                }
            }
            
            handleMouseMove(e) {
                const pos = this.getMousePosition(e);
                const seat = this.getSeatAtPosition(pos.x, pos.y);
                
                if (seat !== this.hoveredSeat) {
                    this.hoveredSeat = seat;
                    this.canvas.style.cursor = (seat && seat.state !== this.SEAT_STATES.BOOKED) ? 'pointer' : 'default';
                    this.draw();
                }
            }
            
            handleMouseLeave() {
                if (this.hoveredSeat) {
                    this.hoveredSeat = null;
                    this.canvas.style.cursor = 'default';
                    this.draw();
                }
            }
            
            toggleSeat(seat) {
                if (seat.state === this.SEAT_STATES.SELECTED || this.selectedSeats.has(seat.id)) {
                    // Deselect seat
                    this.selectedSeats.delete(seat.id);
                    seat.state = seat.section === 'Premium' ? this.SEAT_STATES.PREMIUM : this.SEAT_STATES.AVAILABLE;
                } else {
                    // Select seat
                    this.selectedSeats.add(seat.id);
                    seat.state = this.SEAT_STATES.SELECTED;
                }
                
                this.updateSelectionDisplay();
                this.draw();
            }
            
            updateSelectionDisplay() {
                const selectedSeatsDisplay = document.getElementById('selectedSeatsDisplay');
                const totalPriceDisplay = document.getElementById('totalPrice');
                
                if (this.selectedSeats.size === 0) {
                    selectedSeatsDisplay.textContent = 'No seats selected';
                    totalPriceDisplay.textContent = 'Total: ₹0';
                    return;
                }
                
                const selectedSeatsList = Array.from(this.selectedSeats);
                const totalPrice = selectedSeatsList.reduce((total, seatId) => {
                    const seat = this.seats.find(s => s.id === seatId);
                    return total + seat.price;
                }, 0);
                
                selectedSeatsDisplay.textContent = `Selected Seats: ${selectedSeatsList.join(', ')}`;
                totalPriceDisplay.textContent = `Total: ₹${totalPrice}`;
            }
            
            getSeatColor(seat) {
                const colors = {
                    [this.SEAT_STATES.AVAILABLE]: '#e8f5e8',
                    [this.SEAT_STATES.SELECTED]: '#4CAF50',
                    [this.SEAT_STATES.BOOKED]: '#f44336',
                    [this.SEAT_STATES.PREMIUM]: '#ffd700'
                };
                
                return colors[seat.state] || colors[this.SEAT_STATES.AVAILABLE];
            }
            
            drawSeat(seat) {
                const ctx = this.ctx;
                const isHovered = this.hoveredSeat === seat;
                
                // Draw seat background
                ctx.fillStyle = this.getSeatColor(seat);
                
                // Add hover effect
                if (isHovered && seat.state !== this.SEAT_STATES.BOOKED) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                }
                
                ctx.fillRect(seat.x, seat.y, seat.width, seat.height);
                
                // Reset shadow
                ctx.shadowBlur = 0;
                
                // Draw seat border
                ctx.strokeStyle = seat.state === this.SEAT_STATES.SELECTED ? '#2E7D32' : '#333';
                ctx.lineWidth = seat.state === this.SEAT_STATES.SELECTED ? 2 : 1;
                ctx.strokeRect(seat.x, seat.y, seat.width, seat.height);
                
                // Draw seat number for larger seats
                if (this.seatWidth >= 20) {
                    ctx.fillStyle = seat.state === this.SEAT_STATES.SELECTED ? 'white' : '#333';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(
                        seat.number, 
                        seat.x + seat.width / 2, 
                        seat.y + seat.height / 2 + 3
                    );
                }
                
                // Draw tooltip on hover
                if (isHovered && seat.state !== this.SEAT_STATES.BOOKED) {
                    this.drawTooltip(seat);
                }
            }
            
            drawTooltip(seat) {
                const ctx = this.ctx;
                const tooltipText = `${seat.id} - ₹${seat.price}`;
                const tooltipX = seat.x + seat.width + 10;
                const tooltipY = seat.y - 5;
                
                // Measure text
                ctx.font = '12px Arial';
                const textMetrics = ctx.measureText(tooltipText);
                const tooltipWidth = textMetrics.width + 16;
                const tooltipHeight = 20;
                
                // Draw tooltip background
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(tooltipX, tooltipY, tooltipWidth, tooltipHeight);
                
                // Draw tooltip text
                ctx.fillStyle = 'white';
                ctx.textAlign = 'left';
                ctx.fillText(tooltipText, tooltipX + 8, tooltipY + 14);
            }
            
            drawRowLabels() {
                const ctx = this.ctx;
                const drawnRows = new Set();
                
                ctx.fillStyle = '#666';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                
                this.seats.forEach(seat => {
                    if (!drawnRows.has(seat.row)) {
                        ctx.fillText(
                            seat.row,
                            seat.x - 25,
                            seat.y + seat.height / 2 + 4
                        );
                        drawnRows.add(seat.row);
                    }
                });
            }
            
            draw() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw seats
                this.seats.forEach(seat => this.drawSeat(seat));
                
                // Draw row labels
                this.drawRowLabels();
                
                // Draw aisle indicators (optional)
                this.drawAisleIndicators();
            }
            
            drawAisleIndicators() {
                const ctx = this.ctx;
                ctx.fillStyle = '#ccc';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                
                // Draw center aisle indicator
                ctx.fillText('← AISLE →', this.canvas.width / 2, this.canvas.height - 20);
            }
        }
        
        // Initialize the theater seat selection
        const theaterSeats = new TheaterSeatSelection('theaterCanvas');
    </script>
</body>
</html>
