<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Seat Selection</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; cursor: pointer; }
        .info { margin: 10px 0; }
    </style>
</head>
<body>
    <h2>Simple Theater Seat Selection</h2>
    <canvas id="seatCanvas" width="600" height="300"></canvas>
    <div class="info" id="seatInfo">Click on seats to select/deselect them</div>

    <script>
        const canvas = document.getElementById('seatCanvas');
        const ctx = canvas.getContext('2d');
        const seatInfo = document.getElementById('seatInfo');
        
        // Seat configuration
        const SEAT_SIZE = 30;
        const SEAT_SPACING = 5;
        const ROWS = 5;
        const SEATS_PER_ROW = 10;
        const START_X = 50;
        const START_Y = 50;
        
        // Seat states
        const STATES = {
            AVAILABLE: 'available',
            SELECTED: 'selected',
            BOOKED: 'booked'
        };
        
        // Create seat data structure
        let seats = [];
        let selectedSeats = [];
        
        // Initialize seats
        function initSeats() {
            seats = [];
            for (let row = 0; row < ROWS; row++) {
                for (let seatNum = 0; seatNum < SEATS_PER_ROW; seatNum++) {
                    const seat = {
                        id: `${String.fromCharCode(65 + row)}${seatNum + 1}`, // A1, A2, B1, etc.
                        x: START_X + seatNum * (SEAT_SIZE + SEAT_SPACING),
                        y: START_Y + row * (SEAT_SIZE + SEAT_SPACING),
                        state: Math.random() > 0.8 ? STATES.BOOKED : STATES.AVAILABLE
                    };
                    seats.push(seat);
                }
            }
        }
        
        // Draw seats
        function drawSeats() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            seats.forEach(seat => {
                // Set color based on state
                let color;
                switch (seat.state) {
                    case STATES.AVAILABLE:
                        color = '#e8f5e8';
                        break;
                    case STATES.SELECTED:
                        color = '#4CAF50';
                        break;
                    case STATES.BOOKED:
                        color = '#f44336';
                        break;
                }
                
                // Draw seat
                ctx.fillStyle = color;
                ctx.fillRect(seat.x, seat.y, SEAT_SIZE, SEAT_SIZE);
                
                // Draw border
                ctx.strokeStyle = '#333';
                ctx.lineWidth = seat.state === STATES.SELECTED ? 2 : 1;
                ctx.strokeRect(seat.x, seat.y, SEAT_SIZE, SEAT_SIZE);
                
                // Draw seat ID
                ctx.fillStyle = seat.state === STATES.SELECTED ? 'white' : '#333';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(seat.id, seat.x + SEAT_SIZE/2, seat.y + SEAT_SIZE/2 + 4);
            });
        }
        
        // Find seat at coordinates
        function findSeatAt(x, y) {
            return seats.find(seat => 
                x >= seat.x && 
                x <= seat.x + SEAT_SIZE && 
                y >= seat.y && 
                y <= seat.y + SEAT_SIZE
            );
        }
        
        // Handle click events
        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const clickedSeat = findSeatAt(x, y);
            
            if (clickedSeat && clickedSeat.state !== STATES.BOOKED) {
                // Toggle seat selection
                if (clickedSeat.state === STATES.SELECTED) {
                    clickedSeat.state = STATES.AVAILABLE;
                    selectedSeats = selectedSeats.filter(id => id !== clickedSeat.id);
                } else {
                    clickedSeat.state = STATES.SELECTED;
                    selectedSeats.push(clickedSeat.id);
                }
                
                // Update display
                updateInfo();
                drawSeats();
            }
        });
        
        // Update selection info
        function updateInfo() {
            if (selectedSeats.length === 0) {
                seatInfo.textContent = 'No seats selected';
            } else {
                seatInfo.textContent = `Selected seats: ${selectedSeats.join(', ')} (${selectedSeats.length} seats)`;
            }
        }
        
        // Initialize and draw
        initSeats();
        drawSeats();
        updateInfo();
    </script>
</body>
</html>
